name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint-and-test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest (unit + integration, not eval)
        run: pytest -m "not eval"
      - name: Pytest (eval)
        run: pytest -m eval
      - name: Smoke test
        shell: bash
        run: |
          if command -v aisurface >/dev/null 2>&1; then
            echo "aisurface console script found at: $(command -v aisurface)"
            aisurface --help
          else
            echo "aisurface console script not on PATH (expected on some Windows installs — use 'python -m scripts.cli' instead)"
          fi
          python -m scripts.cli --help
          python -m scripts.cli doctor --no-color
